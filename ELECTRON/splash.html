<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cargando...</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        background: transparent;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
        -webkit-app-region: drag; /* permite arrastrar la ventana splash */
      }

      .card {
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        border-radius: 20px;
        padding: 40px 50px;
        text-align: center;
        box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(96, 165, 250, 0.15);
        width: 440px;
      }

      .logo-row {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 20px;
        margin-bottom: 24px;
      }

      .logo-box {
        width: 64px;
        height: 64px;
        background: rgba(9, 82, 142, 0.3);
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(96, 165, 250, 0.2);
        font-size: 28px;
      }

      .title {
        font-size: 13px;
        font-weight: 700;
        color: #94a3b8;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        margin-bottom: 6px;
      }

      .subtitle {
        font-size: 20px;
        font-weight: 800;
        color: #f1f5f9;
        margin-bottom: 4px;
      }

      .org {
        font-size: 12px;
        color: #60a5fa;
        font-weight: 600;
        margin-bottom: 32px;
      }

      .spinner-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }

      .spinner {
        width: 36px;
        height: 36px;
        border: 3px solid rgba(96, 165, 250, 0.15);
        border-top: 3px solid #60a5fa;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .loading-text {
        font-size: 13px;
        color: #64748b;
        animation: pulse 1.5s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }

      .version {
        margin-top: 24px;
        font-size: 11px;
        color: #334155;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo-row">
        <div class="logo-box">📋</div>
      </div>

      <p class="title">Sistema de Gestión Documental</p>
      <p class="subtitle">CONADEH</p>
      <p class="org">Unidad de Infotecnología</p>

      <div class="spinner-wrap">
        <div class="spinner"></div>
        <p class="loading-text">Iniciando aplicación...</p>
      </div>

      <p class="version">Honduras, C.A.</p>
    </div>
  </body>
</html>
