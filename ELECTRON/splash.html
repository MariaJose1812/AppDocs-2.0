<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cargando…</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 460px;
        height: 300px;
        background: linear-gradient(
          145deg,
          #073e6b 0%,
          #09528e 55%,
          #0d6db5 100%
        );
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: "Segoe UI", Arial, sans-serif;
        color: #ffffff;
        overflow: hidden;
        border-radius: 12px;
        -webkit-app-region: drag;
        user-select: none;
      }

      .logo-area {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        margin-bottom: 28px;
      }

      .icon-wrap {
        width: 64px;
        height: 64px;
        background: rgba(255, 255, 255, 0.15);
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .icon-wrap svg {
        width: 36px;
        height: 36px;
        fill: #ffffff;
      }

      .app-name {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 0.5px;
        color: #ffffff;
      }

      .app-sub {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.65);
        letter-spacing: 1px;
        text-transform: uppercase;
      }

      .progress-track {
        width: 260px;
        height: 4px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 4px;
        overflow: hidden;
      }

      .progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #4fc3f7, #29b6f6, #81d4fa);
        border-radius: 4px;
        animation: progress 2.8s ease-in-out forwards;
      }

      @keyframes progress {
        0% {
          width: 0%;
        }
        30% {
          width: 45%;
        }
        60% {
          width: 72%;
        }
        85% {
          width: 88%;
        }
        100% {
          width: 98%;
        }
      }

      .status {
        margin-top: 14px;
        font-size: 11px;
        color: rgba(255, 255, 255, 0.5);
        letter-spacing: 0.5px;
        animation: fade 1.4s ease-in-out infinite alternate;
      }

      @keyframes fade {
        from {
          opacity: 0.4;
        }
        to {
          opacity: 0.9;
        }
      }

      .version {
        position: absolute;
        bottom: 14px;
        right: 18px;
        font-size: 10px;
        color: rgba(255, 255, 255, 0.3);
      }
    </style>
  </head>
  <body>
    <div class="logo-area">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6z"
          />
          <polyline
            points="14,2 14,8 20,8"
            style="fill: rgba(255, 255, 255, 0.3)"
          />
          <line
            x1="16"
            y1="13"
            x2="8"
            y2="13"
            stroke="#073E6B"
            stroke-width="1.5"
            stroke-linecap="round"
          />
          <line
            x1="16"
            y1="17"
            x2="8"
            y2="17"
            stroke="#073E6B"
            stroke-width="1.5"
            stroke-linecap="round"
          />
          <polyline
            points="10,9 9,9 8,9"
            stroke="#073E6B"
            stroke-width="1.5"
            stroke-linecap="round"
          />
        </svg>
      </div>

      <div class="app-name">Sistema de Gestión Documental</div>
      <div class="app-sub"> UNIDAD DE INFOTECNOLOGÍA </div>
    </div>

    <div class="progress-track">
      <div class="progress-bar"></div>
    </div>

    <div class="status" id="status">Iniciando aplicación…</div>

    <div class="version">v1.0.0</div>

    <script>
      const mensajes = [
        "Iniciando aplicación…",
        "Cargando módulos…",
        "Preparando interfaz…",
        "Verificando conexión…",
        "Casi listo…",
      ];
      let i = 0;
      const el = document.getElementById("status");
      setInterval(() => {
        i = (i + 1) % mensajes.length;
        el.textContent = mensajes[i];
      }, 900);
    </script>
  </body>
</html>
